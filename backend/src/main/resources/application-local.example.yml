# 本地配置模板（复制为 application-local.yml 后填写）
# 建议：仅在本机保留此文件，不提交到仓库。

spring:
  servlet:
    multipart:
      # 与 application.yml 保持一致，避免退回默认 1MB
      max-file-size: 160MB
      max-request-size: 170MB

  datasource:
    # 例如: jdbc:mysql://127.0.0.1:3306/wolf_chat?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    url: ""
    username: ""
    password: ""

  redis:
    host: ""
    port: 6379
    password: ""
    database: 0

  # 启用真实发信时必填（wolfchat.email.delivery.enabled=true）
  mail:
    host: "smtp.qq.com"
    port: 587
    username: "REPLACE_WITH_QQ_EMAIL"
    password: "REPLACE_WITH_QQ_SMTP_AUTH_CODE"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  # 必填：至少 32 字节随机字符串
  secret: "REPLACE_WITH_AT_LEAST_32_BYTES_SECRET"

wolfchat:
  storage:
    public-base-url: "http://127.0.0.1:8080"
    upload-path: "/api/media/upload"
    read-path: "/api/media/object"
    local-root-dir: "REPLACE_WITH_LOCAL_MEDIA_DIR"
    sign-secret: "REPLACE_WITH_AT_LEAST_16_BYTES_SECRET"
    # 聊天/社区图片大小上限（12MB）
    max-image-size-bytes: 12582912
    # 聊天/社区视频大小上限（150MB）
    max-video-size-bytes: 157286400
    # 聊天文件大小上限（20MB）
    max-file-size-bytes: 20971520

  email:
    # 例如: http://localhost:8080/api/auth/email/verify
    verify-url: "http://127.0.0.1:8080/api/auth/email/verify"
    # 例如: http://localhost:8080/api/auth/password/reset
    reset-password-url: "http://127.0.0.1:8080/api/auth/password/reset"
    delivery:
      # false: 控制台打印链接（开发模式）；true: 真实邮件发送
      enabled: true
      from: "REPLACE_WITH_QQ_EMAIL"
      subject-prefix: "WolfChat"

  ai:
    # 总开关
    enabled: false
    # 当前实现 openai / deepseek
    provider: "deepseek"
    # 例如: https://api.deepseek.com 或 https://api.openai.com
    base-url: ""
    api-key: ""
    # 例如: deepseek-chat / gpt-4.1-mini
    model: ""
    temperature: 0.8
    max-output-tokens: 400
    timeout-ms: 20000

    memory:
      enabled: true
      # 每次推理带入的最近消息条数
      # 建议 20~40；越大成本越高
      recent-window-size: 30
      # 每累计多少条消息做一次摘要
      summary-trigger-message-count: 80
      # 摘要文本最大 token 预算（业务约束）
      summary-max-tokens: 600
      # 例如: text-embedding-3-small
      embedding-model: ""
      # 相似检索召回数量
      top-k: 8

    role:
      # 多人格路由开关
      enabled: true
      # 角色配置缓存秒数（从 wf_ai_role 表加载）
      cache-seconds: 60

    guard:
      # 全局配额守卫，控制成本
      enabled: true
      # 每小时最多触发多少次模型调用（所有场景总和）
      max-calls-per-hour: 80
      # 每天最多触发多少次模型调用（所有场景总和）
      max-calls-per-day: 600

    lobby:
      # 公共聊天室 AI
      enabled: false
      bot-user-id:
      bot-display-name: ""
      # 冷场主动发言开关
      idle-enabled: true
      # 连续多少秒无人发言视为冷场
      idle-trigger-seconds: 90
      # 冷场时主动发言概率（0~1）
      idle-speak-probability: 0.08
      cooldown-seconds: 45
      reply-probability: 0.22
      max-replies-per-hour: 28
      # 单条回复最大字符数
      max-reply-chars: 140
      min-delay-seconds: 6
      max-delay-seconds: 18
      system-prompt: "你是 WolfChat 的狼系老网友。说话短句、有网感、可轻微调侃，不刷屏，不自称AI。"

    private-chat:
      # 私聊 AI（监听“发给机器人”的消息）
      enabled: false
      bot-user-id:
      cooldown-seconds: 30
      reply-probability: 0.60
      max-replies-per-hour: 50
      # 单条回复最大字符数
      max-reply-chars: 180
      min-delay-seconds: 4
      max-delay-seconds: 12
      system-prompt: "你在私聊中，像真人一样自然聊天，允许轻微情绪和调侃，别写长文，禁止自称AI。"

    forum:
      # 社区 AI（主题/回帖触发）
      enabled: false
      bot-user-id:
      cooldown-seconds: 30
      reply-probability: 0.32
      max-replies-per-hour: 36
      # 单条回复最大字符数
      max-reply-chars: 220
      min-delay-seconds: 20
      max-delay-seconds: 90
      reply-to-reply-probability: 0.15
      system-prompt: "你在论坛讨论区发言，观点明确、内容贴题、不过度攻击，1到3句即可。"

    follow:
      # 被关注后自动回关
      auto-follow-back-enabled: false
      min-delay-seconds: 3
      max-delay-seconds: 15
