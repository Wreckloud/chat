# 本地配置模板（复制为 application-local.yml 后填写）
# 建议：仅在本机保留此文件，不提交到仓库。

spring:
  servlet:
    multipart:
      # 与 application.yml 保持一致，避免退回默认 1MB
      max-file-size: 160MB
      max-request-size: 170MB

  datasource:
    # 例如: jdbc:mysql://127.0.0.1:3306/wolf_chat?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    url: ""
    username: ""
    password: ""

  redis:
    host: ""
    port: 6379
    password: ""
    database: 0

  # 启用真实发信时必填（wolfchat.email.delivery.enabled=true）
  mail:
    host: "smtp.qq.com"
    port: 587
    username: "REPLACE_WITH_QQ_EMAIL"
    password: "REPLACE_WITH_QQ_SMTP_AUTH_CODE"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  # 必填：至少 32 字节随机字符串
  secret: "REPLACE_WITH_AT_LEAST_32_BYTES_SECRET"

wolfchat:
  storage:
    public-base-url: "http://127.0.0.1:8080"
    upload-path: "/api/media/upload"
    read-path: "/api/media/object"
    local-root-dir: "REPLACE_WITH_LOCAL_MEDIA_DIR"
    sign-secret: "REPLACE_WITH_AT_LEAST_16_BYTES_SECRET"
    # 聊天/社区图片大小上限（12MB）
    max-image-size-bytes: 12582912
    # 聊天/社区视频大小上限（150MB）
    max-video-size-bytes: 157286400
    # 聊天文件大小上限（20MB）
    max-file-size-bytes: 20971520

  email:
    # 例如: http://localhost:8080/api/auth/email/verify
    verify-url: "http://127.0.0.1:8080/api/auth/email/verify"
    # 例如: http://localhost:8080/api/auth/password/reset
    reset-password-url: "http://127.0.0.1:8080/api/auth/password/reset"
    delivery:
      # false: 控制台打印链接（开发模式）；true: 真实邮件发送
      enabled: true
      from: "REPLACE_WITH_QQ_EMAIL"
      subject-prefix: "WolfChat"

  ai:
    # 总开关
    enabled: false
    # 当前实现 openai / deepseek
    provider: "deepseek"
    # 例如: https://api.deepseek.com 或 https://api.openai.com
    base-url: ""
    api-key: ""
    # 例如: deepseek-chat / gpt-4.1-mini
    model: ""
    temperature: 0.68
    max-output-tokens: 400
    timeout-ms: 20000

    memory:
      enabled: true
      # 每次推理带入的最近消息条数
      # 建议 20~40；越大成本越高
      recent-window-size: 30
      # 每累计多少条消息做一次摘要
      summary-trigger-message-count: 80
      # 摘要文本最大 token 预算（业务约束）
      summary-max-tokens: 600
      # 例如: text-embedding-3-small
      embedding-model: ""
      # 相似检索召回数量
      top-k: 8

    role:
      # 多人格路由开关
      enabled: true
      # 角色配置缓存秒数（从 wf_ai_role 表加载）
      cache-seconds: 60
      # 人格短期粘性时长（秒）
      variant-sticky-seconds: 600
      # 人格切换概率（0~1），避免每条都切人格
      variant-switch-probability: 0.18

    guard:
      # 全局配额守卫，控制成本
      enabled: true
      # 每小时最多触发多少次模型调用（所有场景总和）
      max-calls-per-hour: 80
      # 每天最多触发多少次模型调用（所有场景总和）
      max-calls-per-day: 600
    rhythm:
      # 按时段自动调节互动节奏
      enabled: true
      active-start-hour: 9
      active-end-hour: 23
      night-start-hour: 0
      night-end-hour: 6
      active-probability-multiplier: 1.12
      night-probability-multiplier: 0.65
      active-cooldown-multiplier: 0.85
      night-cooldown-multiplier: 1.35
      active-delay-multiplier: 0.85
      night-delay-multiplier: 1.45
    relevance:
      # 回复相关性守卫：识别“答非所问”后触发一次纠偏重试
      enabled: true
      # 普通语句重试阈值（0~1，越高越严格）
      retry-threshold-general: 0.16
      # 疑问句重试阈值（0~1，建议高于普通阈值）
      retry-threshold-question: 0.24

    lobby:
      # 公共聊天室 AI
      enabled: false
      bot-user-id:
      bot-display-name: "夜狼梗王"
      # 紧邻回复识别：用户在AI发言后短时间接话，判定为“可能在对AI说”
      adjacent-directed-enabled: true
      adjacent-directed-window-seconds: 75
      adjacent-directed-max-intervening-messages: 2
      # spicy 档：大厅互动更积极，但仍受守卫限流控制
      cooldown-seconds: 35
      reply-probability: 0.32
      # 被@或被回复时的高优先级回复概率（0~1）
      mention-reply-probability: 0.94
      max-replies-per-hour: 40
      # 单条回复最大字符数
      max-reply-chars: 140
      min-delay-seconds: 4
      max-delay-seconds: 14
      # 被@时的更快延迟（仍非秒回）
      mention-min-delay-seconds: 2
      mention-max-delay-seconds: 6
      # 低信息短句防尬聊：对“嗯/哦/...”这类输入降概率，避免硬接
      low-signal-guard-enabled: true
      low-signal-probability-multiplier: 0.35
      system-prompt: "你是 WolfChat 的狼系老网友，不是助手。说话短句、直接、有网感；可轻松调侃，但先给正向反馈再提建议，不做人身打击；不刷屏，不自称AI。"

    private-chat:
      # 私聊 AI（监听“发给机器人”的消息）
      enabled: false
      bot-user-id:
      # 私聊更活跃：提高触发率并缩短冷却
      cooldown-seconds: 14
      reply-probability: 0.86
      max-replies-per-hour: 90
      # 单条回复最大字符数
      max-reply-chars: 180
      min-delay-seconds: 2
      max-delay-seconds: 9
      system-prompt: "你在私聊里是有个性的狼系用户，不是客服。表达直接、句子短、可玩梗，但优先接住对方情绪并给建设性回应；禁止自称AI。"

    forum:
      # 社区 AI（主题/回帖触发）
      enabled: false
      bot-user-id:
      cooldown-seconds: 30
      # spicy 档：论坛回帖更活跃，优先高价值互动（@/引用/新主题）
      reply-probability: 0.36
      # 被@时的高优先级回帖概率（0~1）
      mention-reply-probability: 0.93
      max-replies-per-hour: 48
      max-replies-per-day: 150
      # 单条回复最大字符数
      max-reply-chars: 220
      min-delay-seconds: 12
      max-delay-seconds: 45
      # 被@时更快回复，但不秒回
      mention-min-delay-seconds: 4
      mention-max-delay-seconds: 14
      reply-to-reply-probability: 0.18
      system-prompt: "你在论坛发言时保持狼系风格：观点明确、就事论事，先肯定亮点再给建议，可有锋芒但不打击用户，不写公文腔，1到3句即可。"

    follow:
      # 被关注后自动回关
      auto-follow-back-enabled: false
      # 拟人化：延迟十几到二十秒后再回关
      min-delay-seconds: 12
      max-delay-seconds: 20
