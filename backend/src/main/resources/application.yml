spring:
  application:
    name: wolf-chat-server

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/wolf_chat?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 1677

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /api

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# Knife4j 配置
knife4j:
  enable: true
  openapi:
    title: WolfChat API 文档
    description: WolfChat 聊天系统 API 接口文档
    version: 1.0.0
    contact:
      name: Wreckloud
    license: Apache 2.0
    license-url: https://www.apache.org/licenses/LICENSE-2.0.html
    servers:
      - url: http://localhost:8080/api
        description: 本地环境

# 自定义日志相关配置
project:
  folder: D:/Temp/log

# JWT配置
jwt:
  # JWT密钥
  secret: wolfchat-secret-key-2025-12-07-default-key-change-in-production-environment
  # JWT过期时间（秒），默认7天（604800秒）
  expiration: 604800

log:
  root:
    level: info

wolfchat:
  ws:
    # WebSocket 允许的跨域来源模式
    allowed-origin-patterns:
      - http://localhost:*
      - https://localhost:*
      - https://servicewechat.com
      - https://*.servicewechat.com
  email-code:
    cleanup:
      # 是否启用邮箱验证码过期清理任务
      enabled: true
      # 每天凌晨 03:15 执行
      cron: 0 15 3 * * ?
      # 过期后保留天数（便于短期排查）
      retain-days: 7
      # 单批删除数量
      batch-size: 500
      # 单次任务最大批次数
      max-batches: 20
