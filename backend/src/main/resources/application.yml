spring:
  application:
    name: wolf-chat-server
  config:
    import: optional:classpath:application-local.yml
  servlet:
    multipart:
      # 本地媒体上传（图片/视频/文件）统一入口限制：单文件 160MB，请求总量 170MB
      max-file-size: 160MB
      max-request-size: 170MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /api

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# Knife4j 配置
knife4j:
  # 生产环境建议关闭
  enable: true

# 自定义日志相关配置
project:
  folder: D:/Temp/log

# JWT配置
jwt:
  # JWT过期时间（秒），默认7天（604800秒）
  expiration: 604800

log:
  root:
    level: info

wolfchat:
  admin:
    console:
      # 管理端允许访问的用户ID
      allowed-user-ids:
        - 1
  ws:
    # WebSocket 允许的跨域来源模式
    allowed-origin-patterns:
      - http://localhost:*
      - https://localhost:*
      - https://servicewechat.com
      - https://*.servicewechat.com
  storage:
    # 对外访问地址（前端可访问到后端）
    public-base-url: "http://127.0.0.1:${server.port}"
    # 本地上传/读取接口路径
    upload-path: "/api/media/upload"
    read-path: "/api/media/object"
    # 本地媒体存储目录
    local-root-dir: "D:/Temp/wolfchat-media"
    # 读链接签名密钥（至少16字节）
    sign-secret: "wolfchat-local-storage-sign-secret-change-me"
    # 直传策略有效期（秒）
    upload-policy-expire-seconds: 300
    # 签名访问地址有效期（秒）
    download-url-expire-seconds: 86400
    # 聊天/社区图片大小上限（12MB）
    max-image-size-bytes: 12582912
    # 聊天视频大小上限（150MB）
    max-video-size-bytes: 157286400
    # 聊天文件大小上限（20MB）
    max-file-size-bytes: 20971520
  email:
    delivery:
      # true: 使用 SMTP 真实发信；false: 仅控制台打印链接（开发模式）
      enabled: false
      # 启用真实发信时必填
      from: ""
      # 邮件标题前缀
      subject-prefix: "WolfChat"
  ai:
    # AI 总开关
    enabled: false
    provider: "deepseek"
    base-url: ""
    api-key: ""
    model: ""
    temperature: 0.68
    max-output-tokens: 400
    timeout-ms: 20000
    memory:
      enabled: true
      # 每次推理携带的上下文窗口。建议 20~40，越大成本越高
      recent-window-size: 30
      summary-trigger-message-count: 80
      summary-max-tokens: 600
      embedding-model: ""
      top-k: 8
    role:
      # 多人格路由开关
      enabled: true
      # 角色配置缓存秒数（从 wf_ai_role 拉取）
      cache-seconds: 60
      # 人格短期粘性时长（秒）
      variant-sticky-seconds: 600
      # 人格切换概率（0~1），用于避免每条都换人格
      variant-switch-probability: 0.18
    guard:
      # 全局配额守卫：用于控制模型请求量，避免费用失控
      enabled: true
      max-calls-per-hour: 80
      max-calls-per-day: 600
    rhythm:
      # 互动节奏调节：白天更活跃，深夜更克制
      enabled: true
      active-start-hour: 9
      active-end-hour: 23
      night-start-hour: 0
      night-end-hour: 6
      active-probability-multiplier: 1.12
      night-probability-multiplier: 0.65
      active-cooldown-multiplier: 0.85
      night-cooldown-multiplier: 1.35
      active-delay-multiplier: 0.85
      night-delay-multiplier: 1.45
    relevance:
      # 回复相关性守卫：用于识别“答非所问”并触发一次纠偏重试
      enabled: true
      # 普通语句触发重试阈值（0~1，越高越严格）
      retry-threshold-general: 0.16
      # 疑问句触发重试阈值（0~1，建议高于普通阈值）
      retry-threshold-question: 0.24
    lobby:
      enabled: false
      bot-user-id:
      bot-display-name: "雾中烟雨"
      # 紧邻回复识别：用户在AI发言后短时间接话，判定为“可能在对AI说”
      adjacent-directed-enabled: true
      adjacent-directed-window-seconds: 75
      adjacent-directed-max-intervening-messages: 2
      # spicy 档：大厅互动更积极，但仍受守卫限流控制
      cooldown-seconds: 35
      reply-probability: 0.32
      mention-reply-probability: 0.94
      max-replies-per-hour: 40
      max-reply-chars: 140
      min-delay-seconds: 4
      max-delay-seconds: 14
      mention-min-delay-seconds: 2
      mention-max-delay-seconds: 6
      # 低信息短句防尬聊：对“嗯/哦/...”这类输入降概率，避免硬接
      low-signal-guard-enabled: true
      low-signal-probability-multiplier: 0.35
      system-prompt: "你是 WolfChat 的狼系老网友，不是助手。说话短句、直接、有网感，能调侃、能带刺，但不做人身仇恨攻击；不刷屏，不自称AI。"
    private-chat:
      enabled: false
      bot-user-id:
      cooldown-seconds: 14
      reply-probability: 0.86
      max-replies-per-hour: 90
      max-reply-chars: 180
      min-delay-seconds: 2
      max-delay-seconds: 9
      system-prompt: "你在私聊里是有脾气的狼系用户，不是客服。表达直接、句子短、偶尔挖苦和玩梗，别长篇说教，禁止自称AI。"
    forum:
      enabled: false
      bot-user-id:
      cooldown-seconds: 30
      # spicy 档：论坛回帖更活跃，优先高价值互动（@/引用/新主题）
      reply-probability: 0.36
      mention-reply-probability: 0.93
      max-replies-per-hour: 48
      max-replies-per-day: 150
      max-reply-chars: 220
      min-delay-seconds: 12
      max-delay-seconds: 45
      mention-min-delay-seconds: 4
      mention-max-delay-seconds: 14
      reply-to-reply-probability: 0.18
      system-prompt: "你在论坛发言时保持狼系风格：观点明确、就事论事、可带锋芒但不过界，不写公文腔，1到3句即可。"
    follow:
      auto-follow-back-enabled: false
      min-delay-seconds: 12
      max-delay-seconds: 20
