spring:
  application:
    name: wolf-chat-server
  config:
    import: classpath:application-local.yml

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /api

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# Knife4j 配置
knife4j:
  enable: true

# 自定义日志相关配置
project:
  folder: D:/Temp/log

# JWT配置
jwt:
  # JWT过期时间（秒），默认7天（604800秒）
  expiration: 604800

log:
  root:
    level: info

wolfchat:
  admin:
    console:
      # 管理端允许访问的用户ID
      allowed-user-ids:
        - 1
  ws:
    # WebSocket 允许的跨域来源模式
    allowed-origin-patterns:
      - http://localhost:*
      - https://localhost:*
      - https://servicewechat.com
      - https://*.servicewechat.com
  oss:
    # 直传策略有效期（秒）
    upload-policy-expire-seconds: 300
    # 图片签名访问地址有效期（秒）
    download-url-expire-seconds: 86400
    # 聊天图片大小上限（5MB）
    max-image-size-bytes: 5242880
    # 聊天视频大小上限（30MB）
    max-video-size-bytes: 31457280
    # 聊天文件大小上限（20MB）
    max-file-size-bytes: 20971520
